name: Desktop Release

on:
  workflow_dispatch:

jobs:
  release-readiness:
    name: Unity Release Readiness Note
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Report current release status
        run: |
          echo "BE Home for Desktop has cut over to Unity 6000.4."
          echo "Packaged, signed, cross-platform Unity release automation is intentionally staged after the baseline Unity project merge."
          echo "Use root automation locally for the current Windows validation path:"
          echo "  python ./scripts/dev.py desktop test"
          echo "  python ./scripts/dev.py desktop build"
